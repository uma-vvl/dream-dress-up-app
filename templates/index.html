<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Dress-Up Room - A Cozy Fashion Simulator</title>
    <meta name="description" content="Enter your dream dress-up room! Customize hairstyles, dresses, accessories, and jewelry in this cozy pastel dollhouse simulator.">
    <!-- Google Fonts: Fredoka (rounded & cute) and Quicksand -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <!-- FontAwesome for cute icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Game Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div id="game-app">
        <!-- Floating Particles Container -->
        <div id="sparkle-layer"></div>

        <!-- Top Header Navigation -->
        <header class="game-header">
            <div class="logo">
                <span class="logo-emoji"><i class="fa-solid fa-sparkles"></i></span>
                <h1>Dream Dress-Up</h1>
                <span class="logo-subtitle">Room</span>
            </div>
            
            <div class="header-controls">
                <button id="btn-sound-toggle" class="header-btn" title="Toggle Sound FX" aria-label="Toggle Sound Effects">
                    <i class="fa-solid fa-volume-high"></i>
                </button>
                <button id="btn-music-toggle" class="header-btn" title="Toggle Cozy Music" aria-label="Toggle Background Music">
                    <i class="fa-solid fa-music"></i>
                </button>
                <button id="btn-gallery-toggle" class="header-btn primary-header-btn" title="Saved Looks Diary" aria-label="Open Fashion Diary">
                    <i class="fa-solid fa-book-open"></i> Fashion Diary
                </button>
            </div>
        </header>

        <!-- Main Workspace -->
        <main class="game-container">
            
            <!-- LEFT PANEL: The Dressing Room Scene -->
            <section class="dressing-room-section" aria-label="Dressing Room View">
                <div class="room-canvas-container" id="screenshot-area">
                    <!-- Cozy Room Decor Layers (CSS/SVG Background) -->
                    <div class="room-background">
                        <!-- Striped Wallpaper / Walls -->
                        <div class="wall-decor">
                            <div class="window">
                                <div class="sky">
                                    <div class="cloud cloud-1"></div>
                                    <div class="cloud cloud-2"></div>
                                    <div class="sky-star star-1">★</div>
                                    <div class="sky-star star-2">✦</div>
                                </div>
                                <div class="window-frame"></div>
                            </div>
                            <!-- Cozy string lights hanging -->
                            <div class="fairy-lights">
                                <span class="light bulb-1"></span>
                                <span class="light bulb-2"></span>
                                <span class="light bulb-3"></span>
                                <span class="light bulb-4"></span>
                                <span class="light bulb-5"></span>
                                <span class="light bulb-6"></span>
                                <span class="light bulb-7"></span>
                                <span class="light bulb-8"></span>
                            </div>
                        </div>
                        
                        <!-- Decorative Plant -->
                        <div class="plant-decor">
                            <svg viewBox="0 0 100 150" class="monstera-plant">
                                <path d="M50,150 L50,80" stroke="#8c6a5c" stroke-width="6" fill="none"/>
                                <path d="M50,100 Q30,70 15,90 Q10,95 20,80 Q40,60 50,80 Z" fill="#88b48f" />
                                <path d="M50,90 Q70,60 85,80 Q90,85 80,70 Q60,50 50,75 Z" fill="#75a47c" />
                                <path d="M50,110 Q20,90 10,120 Q12,125 25,110 Q35,100 50,110 Z" fill="#699470" />
                                <path d="M50,120 Q80,100 90,130 Q88,135 75,120 Q65,110 50,120 Z" fill="#88b48f" />
                                <!-- Pot -->
                                <path d="M30,130 L70,130 L65,150 L35,150 Z" fill="#ffccd5" />
                                <ellipse cx="50" cy="130" rx="20" ry="4" fill="#e0a3b0" />
                            </svg>
                        </div>

                        <!-- Vanity Mirror and Table -->
                        <div class="vanity-decor">
                            <div class="mirror-frame">
                                <div class="mirror-glass">
                                    <!-- Reflection highlight -->
                                    <div class="mirror-glare"></div>
                                </div>
                                <div class="mirror-lights">
                                    <span class="mirror-bulb bulb-l1"></span>
                                    <span class="mirror-bulb bulb-l2"></span>
                                    <span class="mirror-bulb bulb-l3"></span>
                                    <span class="mirror-bulb bulb-r1"></span>
                                    <span class="mirror-bulb bulb-r2"></span>
                                    <span class="mirror-bulb bulb-r3"></span>
                                    <span class="mirror-bulb bulb-t1"></span>
                                    <span class="mirror-bulb bulb-t2"></span>
                                    <span class="mirror-bulb bulb-t3"></span>
                                </div>
                            </div>
                            <div class="vanity-table">
                                <div class="table-surface"></div>
                                <div class="drawer-knobs">
                                    <span class="knob"></span>
                                    <span class="knob"></span>
                                </div>
                                <div class="makeup-bottles">
                                    <div class="perfume-bottle"></div>
                                    <div class="magazines"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Plush Rug underneath character -->
                        <div class="plush-rug"></div>
                    </div>

                    <!-- Mascot / Dialogue Box System -->
                    <div class="speech-bubble-container" id="dialogue-box">
                        <div class="mascot-avatar">
                            <svg viewBox="0 0 60 60" class="cute-bunny">
                                <ellipse cx="30" cy="40" rx="18" ry="15" fill="#fff" stroke="#ffccd5" stroke-width="2"/>
                                <!-- Ears -->
                                <ellipse cx="20" cy="22" rx="6" ry="18" fill="#fff" stroke="#ffccd5" stroke-width="2" transform="rotate(-10 20 22)"/>
                                <ellipse cx="20" cy="22" rx="3" ry="12" fill="#ffd0d8"/>
                                <ellipse cx="40" cy="22" rx="6" ry="18" fill="#fff" stroke="#ffccd5" stroke-width="2" transform="rotate(10 40 22)"/>
                                <ellipse cx="40" cy="22" rx="3" ry="12" fill="#ffd0d8"/>
                                <!-- Face -->
                                <circle cx="24" cy="38" r="2" fill="#584848"/>
                                <circle cx="36" cy="38" r="2" fill="#584848"/>
                                <circle cx="21" cy="41" r="3" fill="#ffaab3" opacity="0.6"/>
                                <circle cx="39" cy="41" r="3" fill="#ffaab3" opacity="0.6"/>
                                <path d="M28,42 Q30,44 32,42" stroke="#584848" stroke-width="2" fill="none"/>
                            </svg>
                        </div>
                        <div class="speech-bubble">
                            <p id="dialogue-text">Welcome to Dream Dress-Up Room! Let's style an outfit.</p>
                        </div>
                    </div>

                    <!-- THE CHARACTER CONTAINER (SVGs stacked) -->
                    <div class="character-wrapper" id="character-avatar" aria-label="Aesthetic avatar being styled">
                        <!-- SVGs are generated and appended dynamically via JS to keep layers perfectly aligned -->
                        <div class="character-layer" id="layer-back-hair"></div>
                        <div class="character-layer" id="layer-body"></div>
                        <div class="character-layer" id="layer-underwear"></div>
                        <div class="character-layer" id="layer-face"></div>
                        <div class="character-layer" id="layer-bottom"></div>
                        <div class="character-layer" id="layer-top"></div>
                        <div class="character-layer" id="layer-dress"></div>
                        <div class="character-layer" id="layer-front-hair"></div>
                        <div class="character-layer" id="layer-necklaces"></div>
                        <div class="character-layer" id="layer-earrings"></div>
                        <div class="character-layer" id="layer-bracelets"></div>
                        <div class="character-layer" id="layer-rings"></div>
                        <div class="character-layer" id="layer-hats"></div>
                        <div class="character-layer" id="layer-glasses"></div>
                        <div class="character-layer" id="layer-handbags"></div>
                    </div>

                    <!-- Dynamic Sparles & Click Effects inside Canvas Area -->
                    <div id="character-click-sparkles"></div>
                </div>

                <!-- Customizer Name & Action Buttons below the Room canvas -->
                <div class="room-action-bar">
                    <div class="outfit-name-container">
                        <span class="label">Outfit Name:</span>
                        <div class="name-display-wrapper">
                            <input type="text" id="outfit-name-input" value="Cozy Dreamer" maxlength="25" title="Give your outfit a name">
                            <button id="btn-refresh-name" class="icon-action-btn" title="Generate Random Name" aria-label="Random Outfit Name">
                                <i class="fa-solid fa-arrows-rotate"></i>
                            </button>
                        </div>
                    </div>

                    <div class="character-customizer-quick">
                        <label for="select-skin">Skin tone:</label>
                        <div class="skin-palette" id="skin-tone-selector">
                            <button class="skin-swatch active" data-color="#fdd7cf" style="background-color: #fdd7cf;" aria-label="Peach Skin"></button>
                            <button class="skin-swatch" data-color="#f9beae" style="background-color: #f9beae;" aria-label="Warm Beige Skin"></button>
                            <button class="skin-swatch" data-color="#d99781" style="background-color: #d99781;" aria-label="Golden Tan Skin"></button>
                            <button class="skin-swatch" data-color="#8c5847" style="background-color: #8c5847;" aria-label="Cocoa Skin"></button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- RIGHT PANEL: Interactive Wardrobe & Wardrobe UI -->
            <section class="wardrobe-section" aria-label="Wardrobe Customization Controls">
                
                <!-- Physical Wardrobe Graphics Container -->
                <div class="wardrobe-cabinet-container" id="wardrobe-closet">
                    <!-- Wardrobe Doors (animated) -->
                    <div class="wardrobe-door left-door" id="wardrobe-door-left">
                        <div class="door-panel">
                            <div class="door-detail-box"></div>
                            <div class="door-handle"></div>
                        </div>
                    </div>
                    <div class="wardrobe-door right-door" id="wardrobe-door-right">
                        <div class="door-panel">
                            <div class="door-detail-box"></div>
                            <div class="door-handle"></div>
                        </div>
                    </div>

                    <!-- Inside Wardrobe (visible when doors are open) -->
                    <div class="wardrobe-interior">
                        <!-- Categories Navigation inside the closet -->
                        <nav class="wardrobe-tabs" role="tablist">
                            <button class="wardrobe-tab active" data-category="hairstyles" role="tab" aria-selected="true" aria-controls="pane-hairstyles">
                                <i class="fa-solid fa-scissors"></i> Hair
                            </button>
                            <button class="wardrobe-tab" data-category="tops" role="tab" aria-selected="false" aria-controls="pane-tops">
                                <i class="fa-solid fa-shirt"></i> Tops
                            </button>
                            <button class="wardrobe-tab" data-category="bottoms" role="tab" aria-selected="false" aria-controls="pane-bottoms">
                                <i class="fa-solid fa-person-half-dress"></i> Bottoms
                            </button>
                            <button class="wardrobe-tab" data-category="dresses" role="tab" aria-selected="false" aria-controls="pane-dresses">
                                <i class="fa-solid fa-person-dress"></i> Dresses
                            </button>
                            <button class="wardrobe-tab" data-category="jewelry" role="tab" aria-selected="false" aria-controls="pane-jewelry">
                                <i class="fa-solid fa-gem"></i> Jewels
                            </button>
                            <button class="wardrobe-tab" data-category="accessories" role="tab" aria-selected="false" aria-controls="pane-accessories">
                                <i class="fa-solid fa-bag-shopping"></i> Accs
                            </button>
                        </nav>

                        <!-- Wardrobe Content Grid (Scrollable shelves) -->
                        <div class="wardrobe-shelves-container">
                            <div class="shelf-rack">
                                <span class="shelf-led shadow-glow"></span>
                                <div id="items-grid" class="items-grid" role="tabpanel">
                                    <!-- Items will be populated by Javascript -->
                                </div>
                            </div>
                        </div>

                        <!-- Wardrobe Bottom Drawer: Color Customizer -->
                        <div class="wardrobe-drawer-controls">
                            <div class="color-picker-header">
                                <span><i class="fa-solid fa-palette"></i> Item Color:</span>
                            </div>
                            <div class="color-picker-swatches" id="item-color-palette">
                                <!-- Curated fashion colors populated by JS -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Wardrobe Trigger Buttons -->
                <div class="wardrobe-door-action">
                    <button id="btn-toggle-wardrobe" class="cozy-pill-btn shadow-btn">
                        <span class="open-label"><i class="fa-solid fa-door-open"></i> Open Wardrobe</span>
                        <span class="close-label"><i class="fa-solid fa-door-closed"></i> Close Wardrobe</span>
                    </button>
                </div>

                <!-- Control Buttons for Wardrobe (Reset, Random, Save, Print) -->
                <div class="game-control-pad">
                    <button id="btn-randomize" class="control-btn accent-yellow shadow-btn" title="Randomize Outfit">
                        <i class="fa-solid fa-dice"></i> <span>Randomize</span>
                    </button>
                    <button id="btn-reset" class="control-btn accent-blue shadow-btn" title="Reset Outfit">
                        <i class="fa-solid fa-rotate-left"></i> <span>Reset</span>
                    </button>
                    <button id="btn-save" class="control-btn primary-pink shadow-btn" title="Save look to diary">
                        <i class="fa-solid fa-heart"></i> <span>Save Look</span>
                    </button>
                    <button id="btn-screenshot" class="control-btn secondary-pink shadow-btn" title="Download Image">
                        <i class="fa-solid fa-camera"></i> <span>Download</span>
                    </button>
                </div>

                <!-- Summary Overlay panel showing selected items -->
                <div class="outfit-summary-panel">
                    <h3 class="summary-title"><i class="fa-solid fa-tags"></i> Style Log</h3>
                    <ul class="summary-list" id="style-summary-list">
                        <li><span class="summary-label">Hair:</span> <span class="summary-val" id="summary-hairstyles">None</span></li>
                        <li><span class="summary-label">Top:</span> <span class="summary-val" id="summary-tops">None</span></li>
                        <li><span class="summary-label">Bottom:</span> <span class="summary-val" id="summary-bottoms">None</span></li>
                        <li><span class="summary-label">Dress:</span> <span class="summary-val" id="summary-dresses">None</span></li>
                        <li><span class="summary-label">Jewelry:</span> <span class="summary-val" id="summary-jewelry">None</span></li>
                        <li><span class="summary-label">Accessories:</span> <span class="summary-val" id="summary-accessories">None</span></li>
                    </ul>
                </div>
            </section>
        </main>

        <!-- DIARY / GALLERY MODAL (Saved Outfits) -->
        <div class="modal-overlay" id="gallery-modal" aria-hidden="true" role="dialog">
            <div class="modal-box">
                <header class="modal-header">
                    <h2><i class="fa-solid fa-book-open"></i> My Fashion Diary</h2>
                    <button id="btn-close-gallery" class="close-modal-btn" aria-label="Close Gallery">&times;</button>
                </header>
                <div class="modal-body">
                    <!-- Polaroid Card Grid -->
                    <div class="gallery-grid" id="gallery-items-container">
                        <!-- Polaroids will be populated via backend fetch -->
                        <div class="gallery-empty-state">
                            <i class="fa-solid fa-heart-crack"></i>
                            <p>No outfits saved in your diary yet!</p>
                            <button id="btn-start-styling" class="cozy-pill-btn">Start Styling</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Cute Toast Notifications -->
        <div id="toast-container"></div>
    </div>

    <!-- Web Audio Synthesizer & Game Scripts -->
    <script src="{{ url_for('static', filename='js/game.js') }}"></script>
</body>
</html>
