<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Dress-Up Room - Retro Paint Edition</title>
    <meta name="description" content="Enter your retro pixel dress-up room! Customize hairstyles, dresses, accessories, and jewelry in this cozy MS Paint-inspired doll simulator.">
    <!-- Google Fonts: Fredoka & Quicksand -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <!-- FontAwesome for retro-style icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Game Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div id="game-app">
        <!-- Main MS Paint Window -->
        <div class="paint-window outset-bevel">
            
            <!-- Window Title Bar -->
            <header class="paint-titlebar">
                <div class="titlebar-text">
                    <i class="fa-solid fa-paintbrush"></i>
                    <span>dream_room.bmp - Paint</span>
                </div>
                <div class="titlebar-controls">
                    <button class="win-btn outset-bevel" aria-label="Minimize">🗕</button>
                    <button class="win-btn outset-bevel" aria-label="Maximize">🗖</button>
                    <button class="win-btn outset-bevel" id="win-close-btn" aria-label="Close">🗙</button>
                </div>
            </header>

            <!-- Menu Bar -->
            <nav class="paint-menubar" aria-label="Game Menus">
                <div class="menu-item">
                    File
                    <div class="dropdown-content outset-bevel">
                        <button class="dropdown-item" id="menu-save"><i class="fa-solid fa-heart"></i> Save Look</button>
                        <button class="dropdown-item" id="menu-download"><i class="fa-solid fa-camera"></i> Download</button>
                        <hr style="border: 0.5px solid var(--color-win-shadow);">
                        <button class="dropdown-item" id="menu-reset"><i class="fa-solid fa-trash"></i> Reset Doll</button>
                    </div>
                </div>
                <div class="menu-item">
                    Edit
                    <div class="dropdown-content outset-bevel">
                        <button class="dropdown-item" id="menu-random"><i class="fa-solid fa-dice"></i> Randomize</button>
                        <button class="dropdown-item" id="menu-name"><i class="fa-solid fa-arrows-rotate"></i> Rename</button>
                    </div>
                </div>
                <div class="menu-item">
                    View
                    <div class="dropdown-content outset-bevel">
                        <button class="dropdown-item" id="menu-diary"><i class="fa-solid fa-book-open"></i> Open Diary</button>
                        <button class="dropdown-item" id="menu-sound-toggle"><i class="fa-solid fa-volume-high"></i> Sound FX</button>
                        <button class="dropdown-item" id="menu-music-toggle"><i class="fa-solid fa-music"></i> Play Music</button>
                    </div>
                </div>
                <div class="menu-item">
                    Help
                    <div class="dropdown-content outset-bevel">
                        <button class="dropdown-item" id="menu-about"><i class="fa-solid fa-circle-info"></i> About BMP Paint</button>
                    </div>
                </div>
            </nav>

            <!-- Main Paint Workspace -->
            <main class="paint-workspace">
                
                <!-- 1. LEFT TOOLBOX (Paint tools) -->
                <section class="paint-toolbox" aria-label="Drawing Tools">
                    <button id="tool-pencil" class="tool-btn outset-bevel active" title="Pencil Tool: Click sparkles"><i class="fa-solid fa-pencil"></i></button>
                    <button id="tool-brush" class="tool-btn outset-bevel" title="Brush Tool: Click hearts"><i class="fa-solid fa-brush"></i></button>
                    <button id="tool-bucket" class="tool-btn outset-bevel" title="Paint Bucket: Open wardrobe"><i class="fa-solid fa-fill-drip"></i></button>
                    <button id="tool-eraser" class="tool-btn outset-bevel" title="Eraser: Reset doll"><i class="fa-solid fa-eraser"></i></button>
                    <button id="tool-spray" class="tool-btn outset-bevel" title="Airbrush: Toggle cozy music"><i class="fa-solid fa-spray-can"></i></button>
                    <button id="tool-magnifier" class="tool-btn outset-bevel" title="Magnifier: Open gallery diary"><i class="fa-solid fa-magnifying-glass"></i></button>
                    <button id="tool-text" class="tool-btn outset-bevel" title="Text: Select random name"><i class="fa-solid fa-font"></i></button>
                    <button id="tool-shapes" class="tool-btn outset-bevel" title="Shapes: Randomize outfit"><i class="fa-solid fa-shapes"></i></button>
                </section>

                <!-- 2. WARDROBE ITEMS SLIDE PANEL (Blue panels from references) -->
                <section class="paint-items-sidebar" aria-label="Wardrobe Items">
                    <h3 class="sidebar-title">Items</h3>
                    <div class="items-scroll-box inset-bevel" id="items-grid">
                        <!-- Blue boxes filled dynamically by JS -->
                    </div>
                </section>

                <!-- 3. DRAWING CANVAS (Character & Cozy Room decor) -->
                <section class="paint-canvas-area" aria-label="Drawing Canvas">
                    <div class="canvas-frame inset-bevel" id="screenshot-area">
                        
                        <!-- Pixel Cozy Decor Layers -->
                        <div class="pixel-room-background">
                            <div class="pixel-wall">
                                <!-- Pixel window showing sky -->
                                <div class="pixel-window">
                                    <div class="pixel-sky" style="font-size: 8px; color: white; position: absolute; top: 10px;">☁ ✦ ☁</div>
                                </div>
                            </div>
                            <div class="pixel-floor">
                                <!-- Pixel Rug -->
                                <div class="pixel-rug"></div>
                                <!-- Pixel Monstera potted plant -->
                                <div class="pixel-plant">
                                    <svg viewBox="0 0 50 80" width="100%" height="100%">
                                        <!-- Pot -->
                                        <rect x="15" y="55" width="20" height="20" fill="#FDC3D1" stroke="#6D4C51" stroke-width="2" />
                                        <rect x="12" y="52" width="26" height="4" fill="#FF5C89" stroke="#6D4C51" stroke-width="2" />
                                        <!-- Stems & Leaves -->
                                        <rect x="23" y="25" width="4" height="30" fill="#A8868C" />
                                        <rect x="10" y="20" width="12" height="12" fill="#75A47C" stroke="#6D4C51" stroke-width="2" />
                                        <rect x="28" y="15" width="14" height="14" fill="#699470" stroke="#6D4C51" stroke-width="2" />
                                        <rect x="18" y="8" width="15" height="15" fill="#88B48F" stroke="#6D4C51" stroke-width="2" />
                                    </svg>
                                </div>
                                <!-- Pixel Vanity Dressing Mirror -->
                                <div class="pixel-vanity">
                                    <div class="pixel-mirror">
                                        <!-- Glowing square bulbs -->
                                        <rect x="4" y="15" width="5" height="5" fill="#FFF" />
                                        <rect x="4" y="45" width="5" height="5" fill="#FFF" />
                                        <rect x="71" y="15" width="5" height="5" fill="#FFF" />
                                        <rect x="71" y="45" width="5" height="5" fill="#FFF" />
                                    </div>
                                    <div class="pixel-vanity-table">
                                        <rect x="15" y="15" width="10" height="10" fill="#FF5C89" />
                                        <rect x="75" y="15" width="10" height="10" fill="#FFDE6A" />
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- CHARACTER SPRITE BASE LAYERS -->
                        <div class="character-wrapper" id="character-avatar" aria-label="Pixel Doll Character">
                            <div class="character-layer" id="layer-back-hair"></div>
                            <div class="character-layer" id="layer-body"></div>
                            <div class="character-layer" id="layer-underwear"></div>
                            <div class="character-layer" id="layer-face"></div>
                            <div class="character-layer" id="layer-bottom"></div>
                            <div class="character-layer" id="layer-top"></div>
                            <div class="character-layer" id="layer-dress"></div>
                            <div class="character-layer" id="layer-front-hair"></div>
                            <div class="character-layer" id="layer-necklaces"></div>
                            <div class="character-layer" id="layer-earrings"></div>
                            <div class="character-layer" id="layer-bracelets"></div>
                            <div class="character-layer" id="layer-rings"></div>
                            <div class="character-layer" id="layer-hats"></div>
                            <div class="character-layer" id="layer-glasses"></div>
                            <div class="character-layer" id="layer-handbags"></div>
                        </div>

                        <!-- Sparkles and Clicks -->
                        <div id="character-click-sparkles" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:30;"></div>

                    </div>
                </section>

                <!-- 4. CATEGORY VERTICAL TABS -->
                <section class="paint-category-sidebar outset-bevel" role="tablist" aria-label="Wardrobe Categories">
                    <button class="category-tab-btn outset-bevel active" data-category="hairstyles" role="tab" aria-selected="true">
                        <i class="fa-solid fa-scissors"></i> Hair
                    </button>
                    <button class="category-tab-btn outset-bevel" data-category="tops" role="tab" aria-selected="false">
                        <i class="fa-solid fa-shirt"></i> Tops
                    </button>
                    <button class="category-tab-btn outset-bevel" data-category="bottoms" role="tab" aria-selected="false">
                        <i class="fa-solid fa-person-half-dress"></i> Bottoms
                    </button>
                    <button class="category-tab-btn outset-bevel" data-category="dresses" role="tab" aria-selected="false">
                        <i class="fa-solid fa-person-dress"></i> Dresses
                    </button>
                    <button class="category-tab-btn outset-bevel" data-category="jewelry" role="tab" aria-selected="false">
                        <i class="fa-solid fa-gem"></i> Jewels
                    </button>
                    <button class="category-tab-btn outset-bevel" data-category="accessories" role="tab" aria-selected="false">
                        <i class="fa-solid fa-bag-shopping"></i> Accs
                    </button>
                </section>

            </main>

            <!-- 5. BOTTOM PALETTE (MS Paint color swatches) -->
            <section class="paint-bottom-panel" aria-label="Color Customizer">
                <div class="palette-status-box inset-bevel">
                    <div class="active-color-preview" id="current-color-indicator"></div>
                    <span class="active-color-label">COLOR</span>
                </div>
                <div class="palette-swatches-grid" id="item-color-palette">
                    <!-- Loaded dynamically via JS -->
                </div>
            </section>

            <!-- 6. WINDOW STATUS BAR -->
            <footer class="paint-status-bar inset-bevel">
                <div class="status-field inset-bevel">
                    <span>Outfit: </span>
                    <input type="text" id="outfit-name-input" class="status-name-input" value="Cozy Dreamer" maxlength="25">
                    <button id="btn-refresh-name" class="win-btn outset-bevel" style="width:18px; height:16px; padding:0; display:inline-block;" title="Random Name"><i class="fa-solid fa-arrows-rotate"></i></button>
                </div>
                <div class="status-field inset-bevel" id="status-pixel-coord">
                    x: 130 , y: 180
                </div>
                <div class="status-field inset-bevel" style="min-width: 180px;">
                    Skin: 
                    <span id="skin-tone-selector" style="display:inline-flex; gap:3px; vertical-align:middle; margin-left:4px;">
                        <button class="skin-swatch active" data-color="#fdd7cf" style="background:#fdd7cf; width:12px; height:12px; border:1px solid #000; cursor:pointer;" aria-label="Peach Skin"></button>
                        <button class="skin-swatch" data-color="#f9beae" style="background:#f9beae; width:12px; height:12px; border:1px solid #000; cursor:pointer;" aria-label="Tan Skin"></button>
                        <button class="skin-swatch" data-color="#d99781" style="background:#d99781; width:12px; height:12px; border:1px solid #000; cursor:pointer;" aria-label="Golden Skin"></button>
                        <button class="skin-swatch" data-color="#8c5847" style="background:#8c5847; width:12px; height:12px; border:1px solid #000; cursor:pointer;" aria-label="Cocoa Skin"></button>
                    </span>
                </div>
            </footer>

        </div>

        <!-- Retro Windows Dialog Box (Mascot Speech Dialogue) -->
        <div class="retro-dialog-bubble outset-bevel" id="dialogue-box">
            <div class="dialog-header">
                <span>dream_room_mascot.exe</span>
                <button class="win-btn outset-bevel" style="width:14px; height:12px; font-size:0.6rem; padding-bottom:3px;" id="dialogue-ok-btn">&times;</button>
            </div>
            <div class="dialog-body">
                <div class="dialog-icon">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <div class="dialog-text" id="dialogue-text">
                    Welcome to Dream Dress-Up Room! Let's style an outfit.
                </div>
            </div>
            <div style="padding: 0 12px 10px 12px; text-align: right;">
                <button class="retro-btn outset-bevel" style="width: 50px;" id="btn-dialog-ok">OK</button>
            </div>
        </div>

        <!-- Bottom Action Control Pad -->
        <div class="retro-actions-row">
            <button id="btn-randomize" class="retro-btn outset-bevel"><i class="fa-solid fa-dice"></i> Randomize</button>
            <button id="btn-reset" class="retro-btn outset-bevel"><i class="fa-solid fa-rotate-left"></i> Reset</button>
            <button id="btn-save" class="retro-btn outset-bevel" style="background-color:var(--color-primary-pink); color:white;"><i class="fa-solid fa-heart"></i> Save Look</button>
            <button id="btn-screenshot" class="retro-btn outset-bevel"><i class="fa-solid fa-camera"></i> Download</button>
        </div>

        <!-- Polaroid Saved Outfit Gallery Modal -->
        <div class="modal-overlay" id="gallery-modal" aria-hidden="true" role="dialog">
            <div class="modal-box outset-bevel">
                <header class="paint-titlebar">
                    <div class="titlebar-text">
                        <i class="fa-solid fa-book-open"></i>
                        <span>fashion_diary.txt - Notepad</span>
                    </div>
                    <button class="win-btn outset-bevel" id="btn-close-gallery" aria-label="Close Gallery">🗙</button>
                </header>
                <div class="modal-body inset-bevel">
                    <div class="gallery-grid" id="gallery-items-container">
                        <!-- Filled dynamically -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Cute status logs -->
        <div id="toast-container"></div>
    </div>

    <!-- Web Audio Synthesizer & Game Scripts -->
    <script src="{{ url_for('static', filename='js/game.js') }}"></script>
</body>
</html>
